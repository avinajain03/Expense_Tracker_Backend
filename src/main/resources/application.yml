spring:
  application:
    name: expense-tracker-api
  data:
    mongodb:
      uri: mongodb://localhost:27017/expense_tracker
      database: expense_tracker
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

# Custom app properties
app:
  jwt:
    secret: ${JWT_SECRET:dGhpcy1pcy1hLXNlY3VyZS0yNTYtYml0LXNlY3JldC1rZXktZm9yLWRldg==}
    access-token-expiry: 900000       # 15 minutes
    refresh-token-expiry: 604800000   # 7 days
  ai:
    api-key: ${OPENAI_API_KEY:}
    api-url: https://api.openai.com/v1
    model: gpt-4o-mini
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:4200/auth/google/callback}
  encryption:
    secret: ${ENCRYPTION_SECRET:default-32-char-secret-key-change!}
  cors:
    allowed-origins: http://localhost:4200

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
